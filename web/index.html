<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!--제목 태그로 이루어진 엘리먼트-->
    <h1>뉴스 제목 1</h1>

    <!--내용 관련 엘리먼트 -->
    <p>기사 내용입니다. 1</p>

    <!-- 링크 이동 엘리먼트 -->
    <a href="https://www.naver.com">네이버로 이동</a>

    <!-- 부모 엘리먼트 -->
    <div>
        <!-- 자식 엘리먼트 -->
        <h1 class="sub_2">뉴스제목 2</h1>
        <p>기사 내용 입니다. 2</p>

        <h1 class="sub_2 sub_2_2">뉴스제목 2</h1>
        <p>기사 내용 입니다. 2</p>
    </div>



    <!-- 아래 형식으로도 CSS 작성이 가능하다 -->
    <style>
        h1 {
            color: red;
        }
    </style>
        <style>
        h1 {
            color: red;
        }

        div {
            background-color: green;
        }

        div>h1 {
            color: blue;
        }

        div>.sub_2 {
            background-color: yellow;
        }

        #sub2 {
            background-color: pink;
        }
    </style>
</body>
</body>

</html>
